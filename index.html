<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EpicVault</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0d0d18;
color:white;
padding-bottom:90px;
}

header{
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
background:linear-gradient(90deg,#7b2ff7,#00c6ff);
box-shadow:0 0 20px rgba(0,0,0,.4);
}

.balance{
margin:20px;
padding:20px;
background:#1b1b2d;
border-radius:20px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,.3);
}

.balance h2{
font-size:20px;
margin-bottom:10px;
}

.amount{
font-size:34px;
font-weight:bold;
color:#ffd700;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
}

.card{
background:#1b1b2d;
border-radius:20px;
padding:25px;
text-align:center;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.25s;
}

.card:hover{
transform:scale(1.05);
background:#2b2b44;
}

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#161625;
display:flex;
justify-content:space-around;
padding:15px 0;
}

.bottom button{
background:none;
border:none;
color:white;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
🎮 EpicVault
</header>

<div class="balance">
<h2>Balance</h2>
<div class="amount">0 ⭐</div>
</div>

<div class="grid">

<div class="card">🎁<br>Free Cases</div>

<div class="card">💎<br>Premium Cases</div>

<div class="card">⭐<br>Buy Stars</div>

<div class="card">💰<br>Wallet</div>

</div>

<div class="bottom">
<button>🏠 Home</button>
<button>🎮 Cases</button>
<button>👤 Profile</button>
</div>
<div id="popup" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0d0d18;z-index:999;padding:20px;overflow:auto;">

<button onclick="closePopup()" style="padding:10px 18px;border:none;border-radius:12px;background:#7b2ff7;color:#fff;font-size:16px;">
⬅ Back
</button>

<h2 id="popupTitle" style="margin-top:20px;"></h2>

<p style="margin-top:15px;color:#aaa;">
Bu sahifa keyingi qismda to'ldiriladi...
</p>

</div>

<script>
const cards=document.querySelectorAll(".card");

cards.forEach(card=>{
card.onclick=function(){
document.getElementById("popup").style.display="block";
document.getElementById("popupTitle").innerHTML=card.innerText;
}
});

function closePopup(){
document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
