<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EpicVault</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0b1020;
color:#fff;
overflow-x:hidden;
padding-bottom:90px;
}

header{
padding:20px;
background:linear-gradient(90deg,#6d28d9,#06b6d4);
text-align:center;
font-size:28px;
font-weight:bold;
box-shadow:0 0 25px rgba(0,0,0,.4);
}

.balance{
margin:20px;
padding:20px;
border-radius:20px;
background:linear-gradient(135deg,#1b2440,#111827);
box-shadow:0 0 25px rgba(0,255,255,.12);
}

.balance h2{
font-size:18px;
color:#bdbdbd;
}

.money{
font-size:34px;
font-weight:bold;
margin-top:8px;
color:#FFD700;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
}

.card{
background:#151c30;
border-radius:18px;
overflow:hidden;
transition:.25s;
cursor:pointer;
box-shadow:0 0 18px rgba(0,255,255,.08);
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:130px;
object-fit:cover;
}

.card h3{
padding:12px;
font-size:18px;
}

.card p{
padding:0 12px 15px;
color:#b8b8b8;
font-size:14px;
}

.bottom{
position:fixed;
left:0;
right:0;
bottom:0;
display:flex;
justify-content:space-around;
padding:15px;
background:#111827;
border-top:1px solid #222;
}

.bottom button{
background:none;
border:none;
color:white;
font-size:15px;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0b1020;
z-index:999;
overflow:auto;
padding:20px;
}
</style>
