<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EpicVault</title>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}


body{
background:#0b1020;
color:#fff;
overflow-x:hidden;
padding-bottom:90px;
}

header{
padding:20px;
background:linear-gradient(90deg,#6d28d9,#06b6d4);
text-align:center;
font-size:28px;
font-weight:bold;
box-shadow:0 0 25px rgba(0,0,0,.4);
}

.balance{
margin:20px;
padding:20px;
border-radius:20px;
background:linear-gradient(135deg,#1b2440,#111827);
box-shadow:0 0 25px rgba(0,255,255,.12);
}

.balance h2{
font-size:18px;
color:#bdbdbd;
}

.money{
font-size:34px;
font-weight:bold;
margin-top:8px;
color:#FFD700;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
}

.card{
background:#151c30;
border-radius:18px;
overflow:hidden;
transition:.25s;
cursor:pointer;
box-shadow:0 0 18px rgba(0,255,255,.08);
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:130px;
object-fit:cover;
}

.card h3{
padding:12px;
font-size:18px;
}

.card p{
padding:0 12px 15px;
color:#b8b8b8;
font-size:14px;
}

.bottom{
position:fixed;
left:0;
right:0;
bottom:0;
display:flex;
justify-content:space-around;
padding:15px;
background:#111827;
border-top:1px solid #222;
}

.bottom button{
background:none;
border:none;
color:white;
font-size:15px;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0b1020;
z-index:999;
overflow:auto;
padding:20px;
}
</style>
  </head>

<body>

<header>
🎮 EPIC VAULT
</header>

<div class="balance">
<h2>Balance</h2>
<div class="money">0 ⭐</div>
<p style="margin-top:10px;color:#9ca3af;">Wallet: TON</p>
</div>

<div class="grid">

<div class="card" onclick="openPage('free')">
<img src="https://picsum.photos/400/300?random=1">
<h3>🎁 Free Case</h3>
<p>Open every 24 hours</p>
</div>

<div class="card" onclick="openPage('premium')">
<img src="https://picsum.photos/400/300?random=2">
<h3>💎 Premium Case</h3>
<p>Rare NFT Gifts</p>
</div>

<div class="card" onclick="openPage('casino')">
<img src="https://picsum.photos/400/300?random=3">
<h3>🎰 Casino</h3>
<p>Crash • Dice • Slots</p>
</div>

<div class="card" onclick="openPage('wallet')">
<img src="https://picsum.photos/400/300?random=4">
<h3>💰 Wallet</h3>
<p>Stars & TON</p>
</div>

</div>

<div class="bottom">
<button>🏠 Home</button>
<button>🎁 Cases</button>
<button>👤 Profile</button>
</div>

<div class="popup" id="popup">

<button onclick="closePage()" style="
padding:12px 20px;
border:none;
border-radius:12px;
background:#7b2ff7;
color:white;
margin-bottom:20px;">
⬅ Back
</button>

<div id="content"></div>

</div>

<script>

function openPage(type){

let html="";

if(type=="free"){
html=`
<h2>🎁 Free Case</h2>
<p>Open a free case every day.</p>
<button style="margin-top:20px;padding:15px 30px;background:#00c853;color:white;border:none;border-radius:15px;">
OPEN CASE
</button>
`;
}

if(type=="premium"){
html=`
<h2>💎 Premium Case</h2>
<p>Chance to win Stars, TON and NFT Gifts.</p>
<button style="margin-top:20px;padding:15px 30px;background:#7b2ff7;color:white;border:none;border-radius:15px;">
OPEN PREMIUM
</button>
`;
}

if(type=="casino"){
html=`
<h2>🎰 Casino</h2>

<div class="card"><h3>🚀 Crash</h3></div>
<div class="card"><h3>🎲 Dice</h3></div>
<div class="card"><h3>🎰 Slots</h3></div>
<div class="card"><h3>🃏 Blackjack</h3></div>
`;
}

if(type=="wallet"){
html=`
<h2>💰 Wallet</h2>
<p>TON Balance: 0</p>
<p>Stars: 0 ⭐</p>
`;
}

document.getElementById("content").innerHTML=html;
document.getElementById("popup").style.display="block";

}

function closePage(){
document.getElementById("popup").style.display="none";
}

</script>
</body>
</html>
