<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EpicVault Premium</title>

<style>
*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family:Arial, sans-serif;
}

body{
 background:#080812;
 color:white;
 min-height:100vh;
}

.container{
 padding:20px;
}

.header{
 display:flex;
 justify-content:space-between;
 align-items:center;
}

.logo{
 font-size:26px;
 font-weight:bold;
 color:#00eaff;
}

.balance{
 margin-top:20px;
 background:linear-gradient(135deg,#17172b,#25255a);
 padding:20px;
 border-radius:20px;
 box-shadow:0 0 20px #00eaff55;
}

.balance h3{
 color:#aaa;
}

.balance p{
 font-size:32px;
 margin-top:10px;
 color:#ffd700;
}

.card-grid{
 margin-top:20px;
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:15px;
}

.card{
 background:#151526;
 padding:20px;
 border-radius:18px;
 text-align:center;
 border:1px solid #29294a;
}

.card span{
 font-size:30px;
}

.card h4{
 margin-top:10px;
}

button{
 background:#00eaff;
 border:none;
 padding:12px 20px;
 border-radius:15px;
 font-weight:bold;
 margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<div class="logo">🎮 EpicVault</div>
<div>⭐ 0</div>
</div>

<div class="balance">
<h3>Balance</h3>
<p>0 ⭐</p>
</div>
