<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EpicVault</title>

    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div id="app">

    <header class="header">
        <div class="logo">💎 EpicVault</div>
        <div class="balance">
            ⭐ <span id="balance">0</span>
        </div>
    </header>

    <main class="home">

        <h1>Welcome</h1>
        <p>Win Telegram Stars, Crypto and Rewards.</p>

        <div class="grid">

            <button id="cases">🎁 Cases</button>
            <button id="crash">📈 Crash</button>
            <button id="dice">🎲 Dice</button>
            <button id="blackjack">🃏 Blackjack</button>

            <button id="wallet">👛 Wallet</button>
            <button id="stars">⭐ Buy Stars</button>
            <button id="leaderboard">🏆 Leaderboard</button>
            <button id="settings">⚙ Settings</button>

        </div>

    </main>

    <nav class="bottom-nav">

        <button>🏠 Home</button>
        <button>🎮 Games</button>
        <button>💰 Wallet</button>
        <button>👤 Profile</button>

    </nav>

</div>

<script src="script.js"></script>

</body>
</html>
